<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wrong Date!</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Mali', cursive;
            margin: 0;
            padding: 20px;
            background: radial-gradient(circle at center, #fce4e4 0%, #f7c8c8 100%); /* Soft angry red/pink */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .content-box {
            background-color: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(200, 100, 100, 0.2);
            border: 5px solid #ffb3b3;
            max-width: 400px;
        }

        img {
            width: 150px;
            height: auto;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.4em;
            color: #d14b4b; /* Dark red text */
            font-weight: 600;
            margin-bottom: 30px;
        }

        .back-btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: #ff8080;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-size: 1.1em;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(255, 128, 128, 0.4);
            transition: transform 0.2s, background-color 0.2s;
        }

        .back-btn:hover {
            transform: translateY(-3px);
            background-color: #ff6666;
        }
    </style>
</head>
<body>

    <div class="content-box">
        <img src="https://static.wikia.nocookie.net/emoji5546/images/5/5b/Face-with-bags-under-eyes_on_Apple.png/revision/latest/scale-to-width/360?cb=20250723021804" alt="Tired Face">
        
        <p>Not this date, you ungrateful piece of shit</p>
        
        <a href="index.html" class="back-btn">Try Again</a>
    </div>

</body>
</html>
